<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" height="460" role="img" aria-label="Zone editörü — alan tespiti ve düzeltme">
  <rect x="0" y="0" width="720" height="460" rx="12" fill="#11141d" stroke="#2a2e42"/>
  <!-- araç çubuğu -->
  <rect x="0" y="0" width="720" height="40" rx="12" fill="#1d2030"/>
  <rect x="0" y="28" width="720" height="12" fill="#1d2030"/>
  <text x="20" y="25" fill="#8a90a8" font-family="Segoe UI,sans-serif" font-size="11">Ekle:</text>
  <g font-family="Segoe UI,sans-serif" font-size="10" font-weight="700">
    <rect x="56" y="11" width="56" height="20" rx="6" fill="#1e2b46" stroke="#2563eb"/><text x="64" y="25" fill="#cfe0ff">↗ Seç</text>
    <rect x="118" y="11" width="58" height="20" rx="6" fill="#12141d" stroke="#2a2e42"/><text x="126" y="25" fill="#3b82f6">+ Metin</text>
    <rect x="182" y="11" width="58" height="20" rx="6" fill="#12141d" stroke="#2a2e42"/><text x="190" y="25" fill="#f59e0b">+ Tablo</text>
    <rect x="246" y="11" width="58" height="20" rx="6" fill="#12141d" stroke="#2a2e42"/><text x="254" y="25" fill="#a855f7">+ Figür</text>
    <rect x="310" y="11" width="58" height="20" rx="6" fill="#12141d" stroke="#2a2e42"/><text x="318" y="25" fill="#ef4444">+ Mühür</text>
    <rect x="600" y="11" width="100" height="20" rx="6" fill="#12141d" stroke="#2a2e42"/><text x="612" y="25" fill="#aeb4cc">⤢ Sığdır %43</text>
  </g>
  <!-- kanvas -->
  <rect x="0" y="40" width="720" height="420" fill="#0e0f16"/>
  <rect x="210" y="62" width="300" height="380" rx="3" fill="#fff"/>
  <!-- belge metin satırları -->
  <g stroke="#dde2e8" stroke-width="3"><line x1="228" y1="100" x2="430" y2="100"/><line x1="228" y1="116" x2="480" y2="116"/><line x1="228" y1="180" x2="470" y2="180"/><line x1="228" y1="196" x2="450" y2="196"/></g>
  <!-- zone'lar -->
  <rect x="222" y="86" width="270" height="48" rx="2" fill="#3b82f612" stroke="#3b82f6" stroke-width="2"/>
  <rect x="222" y="86" width="34" height="11" fill="#3b82f6"/><text x="226" y="95" fill="#fff" font-family="Segoe UI,sans-serif" font-size="7" font-weight="700">Metin</text>
  <rect x="222" y="150" width="180" height="20" rx="2" fill="#22c55e12" stroke="#22c55e" stroke-width="2"/>
  <rect x="222" y="150" width="34" height="11" fill="#22c55e"/><text x="226" y="159" fill="#fff" font-family="Segoe UI,sans-serif" font-size="7" font-weight="700">Başlık</text>
  <!-- seçili tablo zone + tutamaçlar -->
  <rect x="222" y="240" width="270" height="120" rx="2" fill="#f59e0b18" stroke="#f59e0b" stroke-width="2"/>
  <rect x="222" y="240" width="34" height="11" fill="#f59e0b"/><text x="226" y="249" fill="#06240f" font-family="Segoe UI,sans-serif" font-size="7" font-weight="700">Tablo</text>
  <g fill="#fff" stroke="#2563eb" stroke-width="1.5"><rect x="217" y="235" width="10" height="10" rx="2"/><rect x="487" y="235" width="10" height="10" rx="2"/><rect x="217" y="355" width="10" height="10" rx="2"/><rect x="487" y="355" width="10" height="10" rx="2"/></g>
  <!-- mühür poligon -->
  <polygon points="400,86 470,92 478,128 410,134 392,108" fill="#ef444418" stroke="#ef4444" stroke-width="2"/>
  <text x="408" y="110" fill="#ef4444" font-family="Segoe UI,sans-serif" font-size="8" font-weight="700">Mühür</text>
</svg>
