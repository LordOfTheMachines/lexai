  <rect x="56" y="108" width="608" height="26" fill="#f2f4f7"/>
  <text x="66" y="126" fill="#14181f" font-family="Arial,sans-serif" font-size="11" font-weight="700">İŞLEM BİLGİLERİ</text>
  <!-- anahtar-değer satırları (zebra) -->
  <g font-family="Arial,sans-serif" font-size="11" fill="#14181f">
    <rect x="56" y="140" width="608" height="30" fill="#fafbfc"/>
    <text x="66" y="159">İŞLEM TÜRÜ</text><text x="240" y="159">FAST Giden Anlık Ödeme</text><text x="430" y="159" font-weight="700">İŞLEM TARİHİ</text><text x="560" y="159">24.09.2024</text>
    <rect x="56" y="176" width="608" height="30" fill="#f2f4f7"/>
    <text x="66" y="195">ALICI BANKA</text><text x="240" y="195">Kuveyt Türk A.Ş.</text><text x="430" y="195" font-weight="700">SORGU NO</text><text x="560" y="195">1308938197</text>
    <rect x="56" y="212" width="608" height="30" fill="#fafbfc"/>
    <text x="66" y="231">İŞLEM TUTARI</text><text x="240" y="231" font-weight="700">13.980,00 TL</text><text x="430" y="231" font-weight="700">GÖNDEREN</text><text x="560" y="231">ÖMER AYAN</text>
    <rect x="56" y="248" width="608" height="30" fill="#f2f4f7"/>
    <text x="66" y="267">ALICI IBAN</text><text x="240" y="267">TR54 0020 5000 0957 9134</text><text x="430" y="267" font-weight="700">İŞLEM NO</text><text x="560" y="267">2024…247</text>
  </g>
  <!-- sol turuncu kenar (orijinal vurgusu) -->
  <rect x="56" y="108" width="3" height="170" fill="#e8a13a"/>
  <!-- alt: kenarlıksız KV örneği -->
  <rect x="56" y="296" width="608" height="118" fill="#fff" stroke="#eef1f4"/>
  <text x="66" y="318" fill="#14181f" font-family="Arial,sans-serif" font-size="11" font-weight="700">SİGORTALI ARAÇ BİLGİLERİ <tspan fill="#8a90a8" font-weight="400">(kenarlıksız → hizadan tablo)</tspan></text>
  <g font-family="Arial,sans-serif" font-size="11" fill="#14181f">
    <text x="66" y="342">Marka</text><text x="210" y="342">: TOFAS-FIAT</text>
    <text x="66" y="362">Model</text><text x="210" y="362">: 2016</text>
    <text x="66" y="382">Plaka</text><text x="210" y="382">: 42 AVR 095</text>
    <text x="380" y="342">Renk</text><text x="500" y="342">: BEYAZ</text>
    <text x="380" y="362">Kilometre</text><text x="500" y="362">: 130000</text>
    <text x="380" y="382">Yakıt</text><text x="500" y="382">: Dizel</text>
  </g>
  <g stroke="#dde3e9" stroke-width="1" stroke-dasharray="3 3"><line x1="200" y1="330" x2="200" y2="392"/><line x1="490" y1="330" x2="490" y2="392"/></g>
</svg>
