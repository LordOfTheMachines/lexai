  <rect x="40" y="129" width="150" height="12" fill="#EE862B"/><text x="46" y="138" font-family="Consolas,monospace" font-size="8" font-weight="700" fill="#1b1f26">hizalama → tablo</text>
  <g fill="#c9ccd2"><rect x="48" y="300" width="300" height="6" rx="3"/><rect x="48" y="312" width="270" height="6" rx="3"/></g>

