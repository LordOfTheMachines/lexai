<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" height="460" role="img" aria-label="Tablo çıkarma — konumlu hücreler">
  <rect x="0" y="0" width="720" height="460" rx="12" fill="#161821" stroke="#2a2e42"/>
  <text x="28" y="40" fill="#aeb4cc" font-family="Segoe UI,sans-serif" font-size="13" font-weight="700">Banka dekontu — konumlu tablo render</text>
  <!-- beyaz sayfa -->
  <rect x="28" y="58" width="664" height="372" rx="4" fill="#fff"/>
  <text x="350" y="92" fill="#14181f" font-family="Segoe UI,sans-serif" font-size="14" font-weight="800" text-anchor="middle">VAKIFBANK</text>
